name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel in-progress runs for the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: type-check-with-retry
        shell: bash
        run: |
          set +e
          npm ci
          install_status=$?
          if [ "$install_status" -eq 0 ]; then
            npx tsc --noEmit
            typecheck_status=$?
          else
            typecheck_status=0
          fi

          if [ "$install_status" -eq 0 ] && [ "$typecheck_status" -eq 0 ]; then
            exit 0
          fi

          echo "Type-check job failed on the first attempt; verifying npm cache and retrying once."
          npm cache verify || true

          npm ci
          install_status=$?
          if [ "$install_status" -ne 0 ]; then
            exit "$install_status"
          fi

          npx tsc --noEmit

  tests:
    name: Tests
    needs: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: install-dependencies
        run: npm ci

      - name: run-vitest
        run: npm run test

  build:
    name: Build
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: install-dependencies
        run: npm ci

      - name: build-cloudflare-pages
        run: npx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_KLIPY_API_KEY: ${{ secrets.NEXT_PUBLIC_KLIPY_API_KEY }}

  cloudflare-pages:
    name: Cloudflare Pages
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: install-dependencies
        run: npm ci

      - name: build-cloudflare-pages
        run: npx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_KLIPY_API_KEY: ${{ secrets.NEXT_PUBLIC_KLIPY_API_KEY }}

      - name: deploy-cloudflare-pages-preview
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler pages deploy .vercel/output/static --project-name=pepchat --branch="${{ github.head_ref }}" --commit-hash="${{ github.sha }}"
